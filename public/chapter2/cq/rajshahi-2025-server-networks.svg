<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">Rajshahi 2025 server based branch and main office networks</title>
  <desc id="desc">Branch office has 10 computers through one server, main office has 50 computers through five servers</desc>
  <rect width="980" height="430" rx="32" fill="#f8fafc"/>
  <text x="490" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#0f172a">Server Based Office Networks</text>
  <g font-family="Arial, sans-serif" font-weight="900" text-anchor="middle">
    <g transform="translate(60 95)">
      <rect width="400" height="270" rx="24" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
      <text x="200" y="42" font-size="23" fill="#0f766e">Branch Office</text>
      <rect x="162" y="96" width="76" height="86" rx="12" fill="#ccfbf1" stroke="#0f766e" stroke-width="4"/>
      <text x="200" y="144" font-size="17" fill="#0f766e">Server</text>
      <g stroke="#0f766e" stroke-width="3">
        <path d="M200 182v38M200 220H80M200 220h120"/>
      </g>
      <g fill="#ecfdf5" stroke="#0f766e" stroke-width="3">
        <rect x="50" y="222" width="60" height="34" rx="8"/><rect x="132" y="222" width="60" height="34" rx="8"/><rect x="214" y="222" width="60" height="34" rx="8"/><rect x="296" y="222" width="60" height="34" rx="8"/>
      </g>
      <text x="200" y="82" font-size="15" fill="#334155">10 computers through 1 server</text>
    </g>
    <g transform="translate(520 95)">
      <rect width="400" height="270" rx="24" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
      <text x="200" y="42" font-size="23" fill="#1e40af">Main Office</text>
      <g fill="#dbeafe" stroke="#2563eb" stroke-width="3">
        <rect x="40" y="84" width="55" height="70" rx="10"/><rect x="120" y="84" width="55" height="70" rx="10"/><rect x="200" y="84" width="55" height="70" rx="10"/><rect x="280" y="84" width="55" height="70" rx="10"/><rect x="160" y="170" width="55" height="70" rx="10"/>
      </g>
      <text x="200" y="262" font-size="15" fill="#334155">50 computers through 5 servers</text>
    </g>
  </g>
</svg>
