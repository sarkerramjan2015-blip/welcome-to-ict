        <path d="M250 139h82"/>
        <path d="M168 108 98 55"/>
        <path d="M222 108 292 55"/>
        <path d="M168 170 98 220"/>
      </g>
      <path d="M222 170 292 220" fill="none" stroke="#16a34a" stroke-width="6" stroke-linecap="round"/>
      <g fill="#dcfce7" stroke="#16a34a" stroke-width="3">
        <circle cx="302" cy="228" r="15"/>
      </g>
      <g fill="#e2e8f0" stroke="#94a3b8" stroke-width="3">
        <circle cx="48" cy="139" r="15"/>
        <circle cx="342" cy="139" r="15"/>
        <circle cx="88" cy="47" r="15"/>
        <circle cx="302" cy="47" r="15"/>
        <circle cx="88" cy="228" r="15"/>
