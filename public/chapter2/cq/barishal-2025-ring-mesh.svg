<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 430" role="img" aria-labelledby="title desc">
  <title id="title">Barishal 2025 ring and mesh topology</title>
  <desc id="desc">Asad network is ring topology and Bashar network is mesh topology</desc>
  <rect width="980" height="430" rx="32" fill="#f8fafc"/>
  <text x="490" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="900" fill="#0f172a">Asad Network and Bashar Network</text>
  <g font-family="Arial, sans-serif" font-weight="900" text-anchor="middle">
    <g transform="translate(70 90)">
      <rect width="390" height="280" rx="24" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
      <text x="195" y="42" font-size="23" fill="#92400e">Asad: Ring Topology</text>
      <g stroke="#f59e0b" stroke-width="6" fill="#fff">
        <path d="M195 82 292 138 292 230 195 250 98 230 98 138Z" fill="none"/>
        <circle cx="195" cy="82" r="18"/><circle cx="292" cy="138" r="18"/><circle cx="292" cy="230" r="18"/><circle cx="195" cy="250" r="18"/><circle cx="98" cy="230" r="18"/><circle cx="98" cy="138" r="18"/>
      </g>
    </g>
    <g transform="translate(520 90)">
      <rect width="390" height="280" rx="24" fill="#fff" stroke="#cbd5e1" stroke-width="3"/>
      <text x="195" y="42" font-size="23" fill="#6d28d9">Bashar: Mesh Topology</text>
      <g stroke="#7c3aed" stroke-width="4" fill="#fff">
        <path d="M105 105h180M105 105l90 130M105 105l180 130M285 105l-90 130M285 105v130M195 235h90"/>
        <circle cx="105" cy="105" r="19"/><circle cx="285" cy="105" r="19"/><circle cx="195" cy="235" r="19"/><circle cx="285" cy="235" r="19"/>
      </g>
    </g>
  </g>
</svg>
