<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" role="img" aria-labelledby="title desc">
  <title id="title">যশোর বোর্ড ২০২৫ স্টার টপোলজি</title>
  <desc id="desc">পাঁচটি কম্পিউটার একটি কেন্দ্রীয় ডিভাইসের মাধ্যমে যুক্ত</desc>
  <rect width="900" height="430" rx="32" fill="#f8fafc"/>
  <text x="450" y="54" text-anchor="middle" font-family="Noto Sans Bengali, Arial, sans-serif" font-size="28" font-weight="800" fill="#0f172a">স্টার টপোলজি: কেন্দ্রীয় ডিভাইস</text>
  <g transform="translate(225 90)" stroke="#0f766e" stroke-width="5" stroke-linecap="round">
    <rect x="172" y="122" width="106" height="70" rx="16" fill="#ccfbf1" stroke="#0f766e"/>
    <text x="225" y="164" text-anchor="middle" font-family="Noto Sans Bengali, Arial, sans-serif" font-size="20" font-weight="800" fill="#0f766e" stroke="none">Switch</text>
    <line x1="225" y1="122" x2="225" y2="40"/>
    <line x1="172" y1="145" x2="70" y2="82"/>
    <line x1="172" y1="182" x2="75" y2="240"/>
    <line x1="278" y1="145" x2="380" y2="82"/>
    <line x1="278" y1="182" x2="375" y2="240"/>
    <g fill="#dbeafe" stroke="#2563eb" stroke-width="3">
      <rect x="185" y="12" width="80" height="48" rx="8"/>
      <rect x="30" y="55" width="80" height="48" rx="8"/>
      <rect x="30" y="235" width="80" height="48" rx="8"/>
      <rect x="340" y="55" width="80" height="48" rx="8"/>
      <rect x="340" y="235" width="80" height="48" rx="8"/>
    </g>
  </g>
  <text x="450" y="382" text-anchor="middle" font-family="Noto Sans Bengali, Arial, sans-serif" font-size="18" fill="#475569">Hub হলে সিগন্যাল broadcast করে, Switch হলে MAC address দেখে নির্দিষ্ট port-এ পাঠায়।</text>
</svg>
